name: Sync Reading List

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.ZOTERO_API_KEY }}" ] && [ -z "${{ secrets.MENDELEY_CLIENT_ID }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "No API credentials configured - skipping sync"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync reading list
        if: steps.check-creds.outputs.configured == 'true'
        env:
          # Mendeley (optional)
          MENDELEY_CLIENT_ID: ${{ secrets.MENDELEY_CLIENT_ID }}
          MENDELEY_CLIENT_SECRET: ${{ secrets.MENDELEY_CLIENT_SECRET }}
          MENDELEY_REFRESH_TOKEN: ${{ secrets.MENDELEY_REFRESH_TOKEN }}
          # Zotero (optional)
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
        run: python sync.py

      - name: Commit changes
        if: steps.check-creds.outputs.configured == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md assets/
          git diff --staged --quiet || git commit -m "Sync reading list"
          git pull --rebase
          git push
